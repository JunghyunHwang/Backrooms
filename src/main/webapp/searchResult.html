<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>backrooms-searchResult</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <!-- CSS Files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/bootstrap-datepicker.css" />
    <link rel="stylesheet" href="assets/css/animate.css" />
    <link rel="stylesheet" href="assets/icons/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/meanmenu.css" />

    <link rel="stylesheet" href="assets/css/scroll-up.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>

  <body>
    <!-- Start Preloader -->
    <div class="preloader_wrap">
      <div class="preloader">
        <span style="--i: 1"></span>
        <span style="--i: 2"></span>
        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
        <span style="--i: 8"></span>
        <span style="--i: 9"></span>
        <span style="--i: 10"></span>
        <span style="--i: 11"></span>
        <span style="--i: 12"></span>
        <span style="--i: 13"></span>
        <span style="--i: 14"></span>
        <span style="--i: 15"></span>
        <span style="--i: 16"></span>
        <span style="--i: 17"></span>
        <span style="--i: 18"></span>
        <span style="--i: 19"></span>
        <span style="--i: 20"></span>
        <h2>Trvelo</h2>
        <div class="preloader_icon fa-solid fa-jet-fighter"></div>
      </div>
    </div>
    <!-- End Preloader -->

    <!-- Offcanvas Area Start -->
    <div class="fix-area">
      <div class="offcanvas__info">
        <div class="offcanvas__wrapper">
          <div class="offcanvas__content">
            <div
              class="offcanvas__top d-flex justify-content-between align-items-center"
            >
              <div class="offcanvas__logo">
                <a href="index.html">
                  <img src="assets/img/logo.svg" alt="edutec" />
                </a>
              </div>
              <div class="offcanvas__close">
                <button>
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <div class="mobile-menu fix mb-3"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="offcanvas__overlay"></div>

    <!-- Start Header -->
    <header id="tr_header"></header>
    <!-- End Header -->

    <!-- Start Left Bar -->
    <section class="tour_details section-padding">
      <div class="container" id="search-container">
        <form class="search">
          <input
            type="search"
            id="search-text"
            name="query"
            placeholder="검색어를 입력하세요"
          />
          <button type="submit" id="search-button">Search</button>
        </form>
      </div>
      <div class="container">
        <div class="row">
          <div class="col-lg-3 col-12 wow fadeIn">
            <div class="tour_widget">
              <div class="slider-filter">
                <!-- 가격대 -->
                <div class="pirce-filter">
                  <div class="pirce-filter-top">
                    <h6>가격대</h6>
                  </div>
                  <div class="pirce-filter-middle">
                    <input
                      type="range"
                      min="0"
                      max="10000000"
                      step="10000"
                      value="10000000"
                    />
                  </div>
                </div>
                <!-- 호텔 성급 -->
                <div class="hotal-star">
                  <div class="hotal-star-text">
                    <hr />
                    <span id="hotal-text"><h6>호텔성급</h6></span>
                  </div>
                  <div class="hotal-star-button">
                    <input type="button" value="2" />
                    <input type="button" value="3" />
                    <input type="button" value="4" />
                    <input type="button" value="5" />
                  </div>
                </div>
              </div>
              <!-- 투숙객 평점 -->
              <div class="hotal-star">
                <div class="visitor-grade">
                  <hr />
                  <span id="visitor-grade-text"><h6>투숙객 평점</h6></span>
                </div>
                <div class="visitor-grade-button">
                  <input type="button" value="3+" />
                  <input type="button" value="3.5+" />
                  <input type="button" value="4+" />
                  <input type="button" value="4.5+" />
                </div>
              </div>
            </div>
          </div>
          <!--- END COL -->

          <div class="col-lg-9 col-12 wow fadeIn">
            <div class="single_tour_details">
              <div class="search-result">
                <div class="single-search-hotal">
                  <div class="single-comment-name">
                    <a id="hotal-name">호텔 이름</a>
                    &emsp;<a id="single-hotal-star">호텔 성급</a>
                  </div>
                  <div class="float-start com-rearch-img">
                    <img src="assets/img/blog/avator/1.jpg" alt="" />
                  </div>
                  <div class="com-content">
                    <p>고객 리뷰</p>
                    <br />
                    <p>룸 정보</p>
                  </div>
                  <div class="com-content-pirce">
                    <p id="content-pirce-text">가격</p>
                    <br />
                    <button
                      onclick="location.href='hotel-details.html'"
                      style="float: right"
                      class="btn_idpw_search"
                    >
                      예약 하기
                    </button>
                  </div>
                </div>

                <div class="single-search-hotal">
                  <div class="single-comment-name">
                    <a id="hotal-name">호텔 이름</a>
                    &emsp;<a id="single-hotal-star">호텔 성급</a>
                  </div>
                  <div class="float-start com-rearch-img">
                    <img src="assets/img/blog/avator/1.jpg" alt="" />
                  </div>
                  <div class="com-content">
                    <p>고객 리뷰</p>
                    <br />
                    <p>룸 정보</p>
                  </div>
                  <div class="com-content-pirce">
                    <p id="content-pirce-text">가격</p>
                    <br />
                    <button
                      onclick="location.href='hotel-details.html'"
                      style="float: right"
                      class="btn_idpw_search"
                    >
                      예약 하기
                    </button>
                  </div>
                </div>

                <div class="single-search-hotal">
                  <div class="single-comment-name">
                    <a id="hotal-name">호텔 이름</a>
                    &emsp;<a id="single-hotal-star">호텔 성급</a>
                  </div>
                  <div class="float-start com-rearch-img">
                    <img src="assets/img/blog/avator/1.jpg" alt="" />
                  </div>
                  <div class="com-content">
                    <p>고객 리뷰</p>
                    <br />
                    <p>룸 정보</p>
                  </div>
                  <div class="com-content-pirce">
                    <p id="content-pirce-text">가격</p>
                    <br />
                    <button
                      onclick="location.href='hotel-details.html'"
                      style="float: right"
                      class="btn_idpw_search"
                    >
                      예약 하기
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <!--- END COL -->
          </div>
        </div>
        <!--- END ROW -->
      </div>
      <!--- END CONTAINER -->
    </section>
    <!-- End Left Bar -->

    <!-- Start footer -->
    <footer
      id="footer"
      class="my-footer p-3 bg-black text-center text-light"
    ></footer>
    <!-- End footer -->

    <!-- Start progress-wrap -->
    <div class="progress-wrap">
      <svg
        class="progress-circle svg-content"
        width="100%"
        height="100%"
        viewBox="-1 -1 102 102"
      >
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
      </svg>
    </div>
    <!-- End progress-wrap -->

    <!-- JS Script -->
    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/datepicker.min.js"></script>
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="assets/js/jquery.meanmenu.min.js"></script>
    <script src="assets/js/jquery.inview.min.js"></script>
    <script src="assets/js/mixitup.min.js"></script>
    <script src="assets/js/nicesellect.js"></script>
    <script src="assets/js/wow.js"></script>
    <script src="assets/js/YouTubePopUp.jquery.js"></script>
    <script src="assets/js/yvpopup-active.js"></script>
    <script src="assets/js/scroll-up.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="assets/js/newslatter.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </body>
</html>
