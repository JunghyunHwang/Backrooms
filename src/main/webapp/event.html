  <body>

    -->

        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
        <span style="--i: 8"></span>
        <span style="--i: 9"></span>
        <span style="--i: 10"></span>
        <span style="--i: 11"></span>
        <span style="--i: 12"></span>
        <span style="--i: 13"></span>
        <span style="--i: 14"></span>
        <span style="--i: 15"></span>
        <span style="--i: 16"></span>
        <span style="--i: 17"></span>
        <span style="--i: 18"></span>
        <span style="--i: 19"></span>
        <span style="--i: 20"></span>
        <h2>Trvelo</h2>
        <div class="preloader_icon fa-solid fa-jet-fighter"></div>

    </div>
    <!-- End Preloader -->

    <!-- Offcanvas Area Start -->
    <div class="fix-area">
      <div class="offcanvas__info">
        <div class="offcanvas__wrapper">
          <div class="offcanvas__content">
            <div
              class="offcanvas__top d-flex justify-content-between align-items-center"
            >
              <div class="offcanvas__logo">
                <a href="index.html">
                  <img src="assets/img/logo.svg" alt="edutec" />

              </div>
              <div class="offcanvas__close">
                <button>

            </div>
            <div class="mobile-menu fix mb-3"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="offcanvas__overlay"></div>

    <div class="d-flex flex-column min-vh-100">
      <!-- Header (unchanged) -->
      <header id="tr_header">
        <!-- ... Your header content goes here ... -->
      </header>

      <!-- Main Content with flex-grow-1 so it expands to fill available space -->
      <main class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-3">이벤트</h2>
        <section
          class="bg-white p-4 rounded border shadow-sm d-flex flex-column"
        >
          <!-- Table container with a fixed height and vertical scroll -->
          <div
            class="table-responsive flex-grow-1"
            style="height: 600px; overflow-y: auto"
          >
            <table
              class="table table-striped table-hover"
              style="table-layout: fixed"
            >
              <thead class="table-dark">
                <tr>
                  <!-- Explicit column widths for consistent layout -->
                  <th scope="col" style="width: 10%" class="text-center">#</th>
                  <th scope="col" style="width: 20%" class="text-center">
                    작성일
                  </th>
                  <th scope="col" style="width: 30%" class="text-start">
                    제목
                  </th>
                  <th scope="col" style="width: 20%" class="text-center">
                    위치
                  </th>
                  <th scope="col" style="width: 20%" class="text-center">
                    작성자
                  </th>
                </tr>
              </thead>
              <tbody id="eventTableBody">
                <!-- Table rows are generated dynamically via JavaScript -->
              </tbody>
            </table>
          </div>
          <!-- Pagination container (stays just below the table) -->
          <nav aria-label="Event Pagination" class="mt-3">
            <ul class="pagination justify-content-center" id="pagination">
              <!-- Pagination buttons will be generated dynamically -->
            </ul>
          </nav>
        </section>
      </main>

      <!-- Start footer -->
      <!-- TODO: footer id footer로 변경 예정: footer 공용틀 id만 남기고 class삭제한 이후에 -->
      <footer id="footer-##">
        <div class="my-footer p-3 bg-black text-center text-light mt-auto">
          Copyright © 2025 Backrooms All Right Reserved.
        </div>
      </footer>
      <!-- End footer -->
    </div>

    <!-- Event Modal -->
    <section
      class="modal fade"
      id="eventModal"
      tabindex="-1"
      aria-labelledby="eventModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <article class="modal-content">
          <header class="modal-header">
            <h5 class="modal-title" id="eventModalLabel">이벤트 상세 정보</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </header>
          <div class="modal-body">
            <p><strong>작성일:</strong> <span id="modalDate"></span></p>
            <p><strong>제목:</strong> <span id="modalTitle"></span></p>
            <p><strong>위치:</strong> <span id="modalLocation"></span></p>
            <p><strong>작성자:</strong> <span id="modalOrganizer"></span></p>
            <p><strong>설명:</strong> <span id="modalDescription"></span></p>
          </div>
          <footer class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              닫기
            </button>
          </footer>
        </article>
      </div>
    </section>

    <!-- Progress Wrap (unchanged) -->
    <div class="progress-wrap">
      <svg
        class="progress-circle svg-content"
        width="100%"
        height="100%"
        viewBox="-1 -1 102 102"
      >
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"></path>
      </svg>
    </div>

    <!-- JavaScript: Data and Pagination Functions -->
    <script>
      // -------------------- Configuration --------------------
      // Set number of rows per page (예: 5행)
      const rowsPerPage = 12;
      let currentPage = 1;

      // -------------------- Functions --------------------

      // loadTable: Loads the table rows for the current page.
      function loadTable(page) {
        const tableBody = document.getElementById("eventTableBody");
        tableBody.innerHTML = ""; // Clear previous rows

        const start = (page - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedItems = events.slice(start, end);

        paginatedItems.forEach((event, index) => {
          const row = document.createElement("tr");
          row.classList.add("align-middle");
          row.style.cursor = "pointer";
          // Set modal attributes for Bootstrap
          row.setAttribute("data-bs-toggle", "modal");
          row.setAttribute("data-bs-target", "#eventModal");
          row.onclick = () => openEventModal(event);

          // Create table row with fixed column widths
          row.innerHTML = `
            <th scope="row" style="width: 10%;" class="text-center">${start + index + 1}</th>
            <td style="width: 20%;" class="text-center">${event.date}</td>
            <td style="width: 30%;" class="text-truncate">${event.title}</td>
            <td style="width: 20%;" class="text-center">${event.location}</td>
            <td style="width: 20%;" class="text-center">${event.organizer}</td>
          `;
          tableBody.appendChild(row);
        });
        updatePagination();
      }

      // updatePagination: Updates the pagination buttons.
      function updatePagination() {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";
        const totalPages = Math.ceil(events.length / rowsPerPage);

        for (let i = 1; i <= totalPages; i++) {
          const li = document.createElement("li");
          li.classList.add("page-item");
          if (i === currentPage) li.classList.add("active");

          const link = document.createElement("a");
          link.classList.add("page-link");
          link.href = "#";
          link.innerText = i;
          link.onclick = (e) => {
            e.preventDefault();
            currentPage = i;
            loadTable(currentPage);
          };

          li.appendChild(link);
          pagination.appendChild(li);
        }
      }

      // openEventModal: Opens the modal and fills in the event details.
      function openEventModal(event) {
        document.getElementById("modalDate").textContent = event.date;
        document.getElementById("modalTitle").textContent = event.title;
        document.getElementById("modalLocation").textContent = event.location;
        document.getElementById("modalOrganizer").textContent = event.organizer;
        document.getElementById("modalDescription").textContent = event.content;
      }

      // Initialize the table when the window loads.
      window.onload = () => loadTable(currentPage);
    </script>
