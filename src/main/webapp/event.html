    <!-- Main Content with a fixed height so that the pagination remains in place -->
    <!-- 메인 콘텐츠: 테이블 영역의 높이를 고정하여 페이지네이션 위치가 일정하게 유지되도록 합니다. -->
    <main class="container my-5">
      <h2 class="fw-bold">이벤트</h2>
      <section class="bg-white p-4 rounded border shadow-sm d-flex flex-column">
        <!-- 
          Set the table container to a fixed height (e.g., 400px) and enable vertical scrolling.
          테이블 컨테이너에 고정 높이(예: 400px)를 지정하고 수직 스크롤을 활성화합니다.
        -->
        <div
          class="table-responsive flex-grow-1"
          style="height: 400px; overflow-y: auto"
        >
          <!-- Use table-layout: fixed so that column widths remain constant -->
          <table
            class="table table-striped table-hover"
            style="table-layout: fixed"
          >
            <thead class="table-dark">
              <tr>
                <!-- Explicit column widths using inline style and Bootstrap utility classes -->
                <th scope="col" style="width: 10%" class="text-center">#</th>
                <th scope="col" style="width: 20%" class="text-center">
                  작성일
                </th>
                <th scope="col" style="width: 30%" class="text-start">제목</th>
                <th scope="col" style="width: 20%" class="text-center">위치</th>
                <th scope="col" style="width: 20%" class="text-center">
                  작성자
                </th>
              </tr>
            </thead>
            <tbody id="eventTableBody">
              <!-- Table rows are generated dynamically -->
            </tbody>
          </table>
        </div>
        <!-- Fixed pagination container below the table container -->
        <!-- 테이블 아래에 고정된 페이지네이션 영역 -->
        <nav aria-label="Event Pagination" class="mt-3">
          <ul class="pagination justify-content-center" id="pagination">
            <!-- Pagination buttons will be generated dynamically -->
          </ul>
        </nav>
      </section>
    </main>

    <!-- Event Modal -->
    <section
      class="modal fade"
      id="eventModal"
      tabindex="-1"
      aria-labelledby="eventModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <article class="modal-content">
          <header class="modal-header">
            <h5 class="modal-title" id="eventModalLabel">이벤트 상세 정보</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </header>
          <div class="modal-body">
            <p><strong>작성일:</strong> <span id="modalDate"></span></p>
            <p><strong>제목:</strong> <span id="modalTitle"></span></p>
            <p><strong>위치:</strong> <span id="modalLocation"></span></p>
            <p><strong>작성자:</strong> <span id="modalOrganizer"></span></p>
            <p><strong>설명:</strong> <span id="modalDescription"></span></p>
          </div>
          <footer class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              닫기
            </button>
          </footer>
        </article>
      </div>
    </section>

    <!-- Start footer -->
    <div class="my-footer p-3 bg-black text-center text-light">
      Copyright © 2025 Backrooms All Right Reserved.
    </div>
    <!-- End footer -->

    <!-- Start progress-wrap -->
    <div class="progress-wrap">
      <svg
        class="progress-circle svg-content"
        width="100%"
        height="100%"
        viewBox="-1 -1 102 102"
      >
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
      </svg>
    </div>
    <!-- End progress-wrap -->

    <!-- JavaScript: Data and Pagination Functions -->
    <script>
      // -------------------- Data --------------------
      // Mock event data (이벤트 데이터 목업)
      const events = [
        {
          id: 1,
          date: "2025-07-01",
          title: "여름 바캉스 특별 할인",
          location: "서울 강남 호텔",
          organizer: "호텔 마케팅팀",
          content:
            "7~8월 투숙객 대상 최대 30% 할인! 조식 포함된 스페셜 패키지 제공.",
        },
        {
          id: 2,
          date: "2025-09-15",
          title: "가을 단풍 여행 패키지",
          location: "강원도 속초 리조트",
          organizer: "호텔 이벤트팀",
          content:
            "강원도 단풍 시즌을 즐길 수 있는 2박 3일 패키지. 조식 및 스파 이용권 포함!",
        },
        {
          id: 3,
          date: "2025-12-24",
          title: "크리스마스 디너 프로모션",
          location: "부산 해운대 호텔",
          organizer: "레스토랑 매니저",
          content:
            "크리스마스 특별 디너 코스! 라이브 공연과 함께 즐기는 로맨틱한 저녁.",
        },
        {
          id: 4,
          date: "2026-01-01",
          title: "새해맞이 불꽃놀이 패키지",
          location: "제주 오션뷰 리조트",
          organizer: "호텔 기획팀",
          content:
            "새해맞이 불꽃놀이를 객실에서 감상할 수 있는 프리미엄 패키지.",
        },
        {
          id: 5,
          date: "2026-02-14",
          title: "밸런타인데이 로맨틱 패키지",
          location: "서울 남산 호텔",
          organizer: "이벤트 기획팀",
          content:
            "스위트룸 숙박 + 와인 & 초콜릿 세트 제공. 로맨틱한 데이트를 위한 완벽한 선택!",
        },
        {
          id: 6,
          date: "2026-05-05",
          title: "어린이날 패밀리 이벤트",
          location: "대전 패밀리 호텔",
          organizer: "가족 서비스팀",
          content: "아이들을 위한 특별 놀이 프로그램 및 키즈 뷔페 운영.",
        },
        {
          id: 7,
          date: "2026-08-20",
          title: "여름 페스티벌 이벤트",
          location: "부산 해운대",
          organizer: "이벤트 운영팀",
          content: "여름철 해운대에서 열리는 뮤직 페스티벌 및 다양한 부대행사.",
        },
      ];

      // -------------------- Configuration --------------------
      // Set number of rows per page.
      // 한 페이지당 표시할 행의 수 (예: 5행)
      const rowsPerPage = 5;
      let currentPage = 1;

      // -------------------- Functions --------------------

      // loadTable: Loads the table rows for the current page.
      // loadTable: 현재 페이지에 해당하는 테이블 행을 로드합니다.
      function loadTable(page) {
        const tableBody = document.getElementById("eventTableBody");
        tableBody.innerHTML = ""; // Clear existing rows

        const start = (page - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedItems = events.slice(start, end);

        paginatedItems.forEach((event, index) => {
          const row = document.createElement("tr");
          row.classList.add("align-middle");
          row.style.cursor = "pointer";
          // Set modal attributes for Bootstrap
          row.setAttribute("data-bs-toggle", "modal");
          row.setAttribute("data-bs-target", "#eventModal");
          row.onclick = () => openEventModal(event);

          // Create table row with fixed column widths
          row.innerHTML = `
            <th scope="row" style="width: 10%;" class="text-center">${start + index + 1}</th>
            <td style="width: 20%;" class="text-center">${event.date}</td>
            <td style="width: 30%;" class="text-truncate">${event.title}</td>
            <td style="width: 20%;" class="text-center">${event.location}</td>
            <td style="width: 20%;" class="text-center">${event.organizer}</td>
          `;
          tableBody.appendChild(row);
        });
        updatePagination();
      }

      // updatePagination: Updates the pagination buttons.
      // updatePagination: 페이지네이션 버튼을 업데이트합니다.
      function updatePagination() {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";
        const totalPages = Math.ceil(events.length / rowsPerPage);

        for (let i = 1; i <= totalPages; i++) {
          const li = document.createElement("li");
          li.classList.add("page-item");
          if (i === currentPage) li.classList.add("active");

          const link = document.createElement("a");
          link.classList.add("page-link");
          link.href = "#";
          link.innerText = i;
          link.onclick = (e) => {
            e.preventDefault();
            currentPage = i;
            loadTable(currentPage);
          };

          li.appendChild(link);
          pagination.appendChild(li);
        }
      }

      // openEventModal: Opens the modal and fills in the event details.
      // openEventModal: 이벤트 모달을 열고 세부 정보를 채웁니다.
      function openEventModal(event) {
        document.getElementById("modalDate").textContent = event.date;
        document.getElementById("modalTitle").textContent = event.title;
        document.getElementById("modalLocation").textContent = event.location;
        document.getElementById("modalOrganizer").textContent = event.organizer;
        document.getElementById("modalDescription").textContent = event.content;
      }

      // Initialize the table when the window loads
      // 윈도우 로드 시 테이블을 초기화합니다.
      window.onload = () => loadTable(currentPage);
    </script>

    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="assets/js/jquery.meanmenu.min.js"></script>
    <script src="assets/js/jquery.inview.min.js"></script>
    <script src="assets/js/mixitup.min.js"></script>
    <script src="assets/js/nicesellect.js"></script>
    <script src="assets/js/wow.js"></script>
    <script src="assets/js/YouTubePopUp.jquery.js"></script>
    <script src="assets/js/yvpopup-active.js"></script>
    <script src="assets/js/scroll-up.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="assets/js/newslatter.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </body>
