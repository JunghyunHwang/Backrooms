<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS Files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/bootstrap-datepicker.css" />
    <link rel="stylesheet" href="assets/css/animate.css" />
    <link rel="stylesheet" href="assets/icons/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/meanmenu.css" />
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css" />
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/css/niceselect.css" />
    <link rel="stylesheet" href="assets/css/YouTubePopUp.css" />
    <link rel="stylesheet" href="assets/css/scroll-up.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <!-- Start Preloader -->

    <div class="preloader_wrap">
      <div class="preloader">
        <span style="--i: 1"></span>
        <span style="--i: 2"></span>
        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
        <span style="--i: 8"></span>
        <span style="--i: 9"></span>
        <span style="--i: 10"></span>
        <span style="--i: 11"></span>
        <span style="--i: 12"></span>
        <span style="--i: 13"></span>
        <span style="--i: 14"></span>
        <span style="--i: 15"></span>
        <span style="--i: 16"></span>
        <span style="--i: 17"></span>
        <span style="--i: 18"></span>
        <span style="--i: 19"></span>
        <span style="--i: 20"></span>
        <h2>Trvelo</h2>
        <div class="preloader_icon fa-solid fa-jet-fighter"></div>
      </div>
    </div>
    <!-- End Preloader -->

    <!-- Offcanvas Area Start -->
    <div class="fix-area">
      <div class="offcanvas__info">
        <div class="offcanvas__wrapper">
          <div class="offcanvas__content">
            <div
              class="offcanvas__top d-flex justify-content-between align-items-center"
            >
              <div class="offcanvas__logo">
                <a href="index.html">
                  <img src="assets/img/logo.svg" alt="edutec" />
                </a>
              </div>
              <div class="offcanvas__close">
                <button>
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <div class="mobile-menu fix mb-3"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="offcanvas__overlay"></div>

    <div class="d-flex flex-column min-vh-100">
      <!-- Start Header -->
      <header id="tr_header"></header>
      <!-- End Header -->
      <!-- Main Content with fixed height so that 7 rows are visible -->
      <!-- 메인 콘텐츠: 고정 높이를 지정하여 7개의 데이터 행이 항상 보이도록 합니다. -->
      <main class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-3">공지사항</h2>
        <section
          class="bg-white p-4 rounded border shadow-sm d-flex flex-column"
        >
          <!-- Fixed table container with vertical scroll -->
          <!-- 테이블 컨테이너의 높이를 고정하여 스크롤 가능하도록 설정합니다. -->
          <div
            class="table-responsive flex-grow-1"
            style="height: 600px; overflow-y: auto"
          >
            <!-- Use table-layout: fixed for constant column widths -->
            <table
              class="table table-striped table-hover"
              style="table-layout: fixed"
            >
              <thead class="table-dark">
                <tr>
                  <!-- Set explicit column widths using inline styles and Bootstrap text utility classes -->
                  <th scope="col" style="width: 10%" class="text-center">#</th>
                  <th scope="col" style="width: 30%" class="text-center">
                    작성일
                  </th>
                  <th scope="col" style="width: 40%" class="text-start">
                    제목
                  </th>
                  <th scope="col" style="width: 20%" class="text-center">
                    작성자
                  </th>
                </tr>
              </thead>
              <tbody id="noticeTableBody">
                <!-- Table rows will be generated dynamically by JavaScript -->
              </tbody>
            </table>
          </div>
          <!-- Pagination area: Centered pagination with a fixed margin at the bottom -->
          <!-- 페이지네이션 영역: 페이지 번호는 중앙에 고정되고, 적당한 마진을 갖습니다. -->
          <nav aria-label="Notice Pagination" class="mt-3">
            <ul class="pagination justify-content-center" id="pagination">
              <!-- Page buttons will be generated dynamically -->
            </ul>
          </nav>
        </section>
      </main>

      <!--TODO:  footer id footer로 변경 예정: footer 공용틀 id만 남기고 class삭제한 이후에 -->
      <!-- Start footer -->
      <footer id="footer-##">
        <div class="my-footer p-3 bg-black text-center text-light mt-auto">
          Copyright © 2025 Backrooms All Right Reserved.
        </div>
      </footer>
    </div>
    <!-- End footer -->

    <!-- Notice Modal (if needed for detail view) -->
    <div
      class="modal fade"
      id="noticeModal"
      tabindex="-1"
      aria-labelledby="noticeModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="noticeModalLabel">
              공지사항 상세 정보
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p><strong>작성일:</strong> <span id="modalDate"></span></p>
            <p><strong>제목:</strong> <span id="modalTitle"></span></p>
            <p><strong>내용:</strong> <span id="modalMessage"></span></p>
            <p><strong>작성자:</strong> <span id="modalAuthor"></span></p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              닫기
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Start progress-wrap -->
    <div class="progress-wrap">
      <svg
        class="progress-circle svg-content"
        width="100%"
        height="100%"
        viewBox="-1 -1 102 102"
      >
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
      </svg>
    </div>
    <!-- End progress-wrap -->
    <!-- JavaScript:Pagination Functions -->
    <script>
      // Number of rows per page (예: 7 rows per page)
      const rowsPerPage = 12;
      let currentPage = 1;

      /******************** Functions ********************/
      // loadTable: Loads the table rows for the current page.
      // loadTable: 현재 페이지의 테이블 행을 로드합니다.
      function loadTable(page) {
        const tableBody = document.getElementById("noticeTableBody");
        tableBody.innerHTML = ""; // Clear existing rows

        const start = (page - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const paginatedItems = notices.slice(start, end);

        paginatedItems.forEach((notice, index) => {
          const row = document.createElement("tr");
          row.classList.add("align-middle");
          row.style.cursor = "pointer";
          // Add Bootstrap modal attributes if you want to open a detail view on click
          row.setAttribute("data-bs-toggle", "modal");
          row.setAttribute("data-bs-target", "#noticeModal");
          row.onclick = () =>
            openNoticeModal(
              notice.date,
              notice.title,
              notice.message,
              notice.author,
            );

          row.innerHTML = `
            <th scope="row" class="text-center">${start + index + 1}</th>
            <td class="text-center text-muted">${notice.date}</td>
            <td class="text-truncate">${notice.title}</td>
            <td class="text-center text-muted">${notice.author}</td>
          `;
          tableBody.appendChild(row);
        });
        updatePagination();
      }

      // updatePagination: Updates the pagination buttons.
      // updatePagination: 페이지네이션 버튼을 업데이트합니다.
      function updatePagination() {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";
        const totalPages = Math.ceil(notices.length / rowsPerPage);

        for (let i = 1; i <= totalPages; i++) {
          const li = document.createElement("li");
          li.classList.add("page-item");
          if (i === currentPage) li.classList.add("active");

          const link = document.createElement("a");
          link.classList.add("page-link");
          link.href = "#";
          link.innerText = i;
          link.onclick = (e) => {
            e.preventDefault();
            currentPage = i;
            loadTable(currentPage);
          };

          li.appendChild(link);
          pagination.appendChild(li);
        }
      }

      // openNoticeModal: Opens the modal and fills in notice details.
      // openNoticeModal: 공지사항 모달을 열고 세부 정보를 채웁니다.
      function openNoticeModal(date, title, message, author) {
        document.getElementById("modalDate").innerText = date;
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalMessage").innerText = message;
        document.getElementById("modalAuthor").innerText = author;
      }

      // Initialize the table on window load
      // 윈도우 로드 시 테이블을 초기화합니다.
      window.onload = () => loadTable(currentPage);
    </script>

    <!-- Include Bootstrap JS and dependencies -->
    <script src="assets/dummy/data/mockNotices.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/datepicker.min.js"></script>
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="assets/js/jquery.meanmenu.min.js"></script>
    <script src="assets/js/jquery.inview.min.js"></script>
    <script src="assets/js/mixitup.min.js"></script>
    <script src="assets/js/nicesellect.js"></script>
    <script src="assets/js/wow.js"></script>
    <script src="assets/js/YouTubePopUp.jquery.js"></script>
    <script src="assets/js/yvpopup-active.js"></script>
    <script src="assets/js/scroll-up.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="assets/js/newslatter.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </body>
</html>
