<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 정보</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 400px;
            border: 2px solid black;
            padding: 15px;
            border-radius: 10px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .profile-photo {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .readonly-info {
            font-size: 14px;
        }
        .readonly-info div {
            margin-bottom: 5px;
        }
        .info-box {
            border: 1px solid black;
            padding: 10px;
            margin-top: 10px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-top: 5px;
        }
        textarea {
            width: 80%;
            height: 20px;
            padding: 3px;
            margin-top: 2px;
            resize: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        textarea:disabled {
            background-color: #f0f0f0;  /* 비활성화 시 회색 배경 */
            color: #777;               /* 글자 색 연하게 */
        }
        .button {
            background-color: lightgreen;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .button:hover {
            background-color: #90ee90;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">회원 정보</div>
    
    <div class="profile-section">
        <div class="profile-photo">프로필 사진</div>
        
        <div class="readonly-info">
            <div><strong>실명:</strong> 홍길동</div>
            <div><strong>생년월일:</strong> 1990-01-01</div>
            <div><strong>이메일:</strong> hong@example.com</div>
        </div>
    </div>

    <div class="info-box">
        <label>전화번호</label>
        <textarea disabled>010-1234-5678</textarea>  <!-- 기본적으로 비활성화 -->

        <label>국가/지역</label>
        <textarea disabled>대한민국, 서울</textarea>  <!-- 비활성화 -->

        <label>닉네임</label>
        <textarea disabled>hgd11</textarea>  <!-- 비활성화 -->

        <button class="button" onclick="toggleEdit()">수정</button>
    </div>
</div>

<script>
    function toggleEdit() {
        const textareas = document.querySelectorAll('textarea');
        const button = document.querySelector('.button');
        const isDisabled = textareas[0].disabled;  // 현재 상태 확인

        textareas.forEach(textarea => {
            textarea.disabled = !isDisabled;       // 활성화/비활성화 전환
        });

        button.textContent = isDisabled ? '완료' : '수정';  // 버튼 텍스트 전환
    }
</script>

</body>
</html>
