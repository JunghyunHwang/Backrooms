		<div class="d-flex justify-content-center align-items-center vh-100 mb-5 mt-5">
  <div class="shadow-lg bg-body-tertiary rounded" style="padding: 40px; width: 800px; height: 100%;">
    <form id="signupForm" method="post" action="login.html">
      <label for="userId" class="form-label">아이디</label>
      <input type="text" class="form-control mb-3" id="userId" placeholder="아이디를 입력해주세요" required>
      
      <label for="password" class="form-label">비밀번호</label>
      <input type="password" class="form-control mb-3" id="password" placeholder="비밀번호" required>
      
      <label for="confirmPassword" class="form-label">비밀번호 확인</label>
      <input type="password" class="form-control mb-3" id="confirmPassword" placeholder="비밀번호를 확인" required>
      
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control mb-3" id="email" placeholder="이메일 주소" required>
      
      <label for="userName" class="form-label">이름</label>
      <input type="text" class="form-control mb-3" id="userName" placeholder="이름" required>
      
      <label for="birthDate" class="form-label">생년월일</label>
      <input type="date" class="form-control mb-3" id="birthDate" required>
      
     <label for="phoneNumber" class="form-label">핸드폰 번호</label>
      <input type="tel" class="form-control mb-5" id="phoneNumber" placeholder="010-1234-5678" required>
      
      <div class="form-check mb-5 border">
      <p>이용약관 내용</p>
        <input class="form-check-input" type="checkbox" id="termsCheck" required>
        <label class="form-check-label" for="termsCheck">
          약관에 동의합니다
        </label>
      </div>
      
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">회원가입</button>
      </div>
    </form>
  </div>
</div>

				<script>
document.getElementById("signupForm").addEventListener("submit", function (event) {
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        event.preventDefault();
        alert("비밀번호가 일치하지 않습니다.");
    }
});
</script>
