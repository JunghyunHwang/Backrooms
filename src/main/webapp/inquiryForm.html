<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backroom - inquiryForm</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <!-- CSS Files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/bootstrap-datepicker.css" />
    <link rel="stylesheet" href="assets/css/animate.css" />
    <link rel="stylesheet" href="assets/icons/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/meanmenu.css" />
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="assets/css/owl.theme.default.min.css" />
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/css/niceselect.css" />
    <link rel="stylesheet" href="assets/css/YouTubePopUp.css" />
    <link rel="stylesheet" href="assets/css/scroll-up.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>

  <body>
    <!-- Start Preloader -->
    <div class="preloader_wrap">
      <div class="preloader">
        <span style="--i: 1"></span>
        <span style="--i: 2"></span>
        <span style="--i: 3"></span>
        <span style="--i: 4"></span>
        <span style="--i: 5"></span>
        <span style="--i: 6"></span>
        <span style="--i: 7"></span>
        <span style="--i: 8"></span>
        <span style="--i: 9"></span>
        <span style="--i: 10"></span>
        <span style="--i: 11"></span>
        <span style="--i: 12"></span>
        <span style="--i: 13"></span>
        <span style="--i: 14"></span>
        <span style="--i: 15"></span>
        <span style="--i: 16"></span>
        <span style="--i: 17"></span>
        <span style="--i: 18"></span>
        <span style="--i: 19"></span>
        <span style="--i: 20"></span>
        <h2>Trvelo</h2>
        <div class="preloader_icon fa-solid fa-jet-fighter"></div>
      </div>
    </div>
    <!-- End Preloader -->

    <!-- Offcanvas Area Start -->
    <div class="fix-area">
      <div class="offcanvas__info">
        <div class="offcanvas__wrapper">
          <div class="offcanvas__content">
            <div
              class="offcanvas__top d-flex justify-content-between align-items-center"
            >
              <div class="offcanvas__logo">
                <a href="index.html">
                  <img src="assets/img/logo.svg" alt="edutec" />
                </a>
              </div>
              <div class="offcanvas__close">
                <button>
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
            <div class="mobile-menu fix mb-3"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="offcanvas__overlay"></div>

    <!-- Start Header -->
    <header id="tr_header"></header>
    <!-- End Header -->

    <!-- Start Left Bar -->

    <!-- Start main -->

    <main class="d-flex justify-content-center align-items-center vh-100">
      <section class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <article class="card shadow-lg border-dark">
              <header class="card-header bg-white text-center">
                <h3 class="text-secondary fw-bold">문의 작성</h3>
              </header>

              <div class="card-body">
                <h2 class="text-end fw-bold mb-4">문의 내용</h2>

                <form action="#" method="POST">
                  <!-- Inquiry Title -->
                  <div class="mb-3">
                    <label for="title" class="form-label fw-bold">제목</label>
                    <input
                      type="text"
                      id="title"
                      name="title"
                      class="form-control border-dark shadow-sm"
                      placeholder="제목을 입력해주세요"
                      required
                    />
                  </div>

                  <!-- Message Input -->
                  <div class="mb-3">
                    <label for="message" class="form-label fw-bold">내용</label>
                    <textarea
                      id="message"
                      name="message"
                      class="form-control border-dark shadow-sm"
                      rows="4"
                      placeholder="내용을 입력해주세요"
                      required
                    ></textarea>
                  </div>

                  <!-- Register Button -->
                  <div class="d-grid">
                    <button type="submit" class="btn btn-dark fw-bold shadow">
                      등록하기
                    </button>
                  </div>
                </form>
              </div>

              <footer class="card-footer text-center text-muted small">
                문의를 작성하시면 관리자에게 전달됩니다.
              </footer>
            </article>
          </div>
        </div>
      </section>
    </main>

    <!--- END CONTAINER -->
    <!-- End Left Bar -->

    <!-- Start footer -->
    <!-- Start footer -->
    <footer
      id="footer"
      class="my-footer p-3 bg-black text-center text-light"
    ></footer>
    <!-- End footer -->
    <!-- End footer -->

    <!-- Start progress-wrap -->
    <div class="progress-wrap">
      <svg
        class="progress-circle svg-content"
        width="100%"
        height="100%"
        viewBox="-1 -1 102 102"
      >
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
      </svg>
    </div>
    <!-- End progress-wrap -->

    <!-- JS Script -->

    <script src="assets/js/header.js"></script>
    <script src="assets/js/footer.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/datepicker.min.js"></script>
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="assets/js/jquery.meanmenu.min.js"></script>
    <script src="assets/js/jquery.inview.min.js"></script>
    <script src="assets/js/mixitup.min.js"></script>
    <script src="assets/js/nicesellect.js"></script>
    <script src="assets/js/wow.js"></script>
    <script src="assets/js/YouTubePopUp.jquery.js"></script>
    <script src="assets/js/yvpopup-active.js"></script>
    <script src="assets/js/scroll-up.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="assets/js/newslatter.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </body>
</html>
