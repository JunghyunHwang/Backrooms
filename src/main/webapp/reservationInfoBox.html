<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 예약</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }

        .container {
            width: 600px;
            margin: 0 auto;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .reservation-card {
            background-color: white;
            border: 2px solid black;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;  /* container 너비 비례 */
        }

        .reservation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .hotel-name {
            font-size: 18px;
            font-weight: bold;
        }

        .reservation-number {
            font-size: 13px;
        }

        .reservation-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hotel-image {
            width: 100px;
            height: 100px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid black;
        }

        .check-info {
            border: 1px solid black;
            padding: 10px 20px;
            font-size: 16px;
            text-align: center;
        }

        .payment-info {
            margin-top: 10px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .button {
            background-color: #add8e6;
            padding: 5px 10px;
            border: 1px solid black;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .button:hover {
            background-color: #87ceeb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">나의 예약</div>

    <!-- 예약 카드 1 -->
    <div class="reservation-card">
        <div class="reservation-header">
            <div class="hotel-name">호텔 A</div>
            <div class="reservation-number">예약 번호: 0000111122223333</div>
        </div>
        <div class="reservation-content">
            <div class="hotel-image">호텔 이미지</div>
            <div class="check-info">
                체크인: 2월 28일<br>
                체크아웃: 3월 2일
            </div>
        </div>
        <div class="payment-info">결제 금액: 300,000원</div>
        <div class="button-group">
            <button class="button">수정</button>
            <button class="button">취소</button>
            <button class="button">리뷰 작성하기</button>
        </div>
    </div>

    <!-- 예약 카드 2 -->
    <div class="reservation-card">
        <div class="reservation-header">
            <div class="hotel-name">호텔 B</div>
            <div class="reservation-number">예약 번호: 0000111122224444</div>
        </div>
        <div class="reservation-content">
            <div class="hotel-image">호텔 이미지</div>
            <div class="check-info">
                체크인: 3월 5일<br>
                체크아웃: 3월 8일
            </div>
        </div>
        <div class="payment-info">결제 금액: 450,000원</div>
        <div class="button-group">
            <button class="button">수정</button>
            <button class="button">취소</button>
            <button class="button">리뷰 작성하기</button>
        </div>
    </div>

    <!-- 예약 카드 3 -->
    <div class="reservation-card">
        <div class="reservation-header">
            <div class="hotel-name">호텔 C</div>
            <div class="reservation-number">예약 번호: 0000111122225555</div>
        </div>
        <div class="reservation-content">
            <div class="hotel-image">호텔 이미지</div>
            <div class="check-info">
                체크인: 4월 10일<br>
                체크아웃: 4월 12일
            </div>
        </div>
        <div class="payment-info">결제 금액: 200,000원</div>
        <div class="button-group">
            <button class="button">수정</button>
            <button class="button">취소</button>
            <button class="button">리뷰 작성하기</button>
        </div>
    </div>
</div>

</body>
</html>
